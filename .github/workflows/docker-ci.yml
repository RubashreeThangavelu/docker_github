name: Selenium Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}


      - name: Stop old containers
        run: docker compose down -v

      - name: Build containers
        run: docker compose build


      - name: Start containers
        run: docker compose up -d

      - name: Wait for MySQL
        run: |
          until docker compose exec mysql-db1 mysqladmin ping -uroot -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 5
          done

      - name: Check DB tables
        run: |
          docker compose exec mysql-db1 mysql -uroot -proot -e "USE login_db; SHOW TABLES;"

      - name: Run tests
        run: docker compose run --rm selenium-tests mvn test


      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-reports
          path: target/surefire-reports/


      - name: Stop containers
        if: always()
        run: docker compose down -v
