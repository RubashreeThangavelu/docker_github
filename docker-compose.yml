services:

  app:
    image: tomcat:10.1
    container_name: tomcat-app1
    ports:
      - "8081:8080"
    volumes:
      - ./Docker_backup:/usr/local/tomcat/webapps/Docker_backup
      - shared-data:/data
    environment:
      - TZ=Asia/Kolkata
      - DB_HOST=mysql-db1
      - DB_PORT=3306
    networks:
      - selenium-grid

  firefox:
    image: selenium/standalone-firefox:4.18.1
    container_name: firefox-github
    shm_size: 2gb
    ports:
      - "4444:4444"
    networks:
      - selenium-grid

  selenium-tests:
    build: .
    container_name: selenium-test
    depends_on:
      - firefox
      - app
      - mysql
    working_dir: /app
    command: >
      sh -c "/init-data.sh; mvn test; mkdir -p /reports; cp -r target/surefire-reports /reports/"
    volumes:
      - ./reports:/reports
      - shared-data:/data
    networks:
      - selenium-grid

  mysql:
    image: mysql:8
    container_name: mysql-github
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    networks:
      - selenium-grid

volumes:
  shared-data:

networks:
  selenium-grid:
    name: selenium-github
