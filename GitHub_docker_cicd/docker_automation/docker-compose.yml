services:

  app:
    image: tomcat:10.1
    container_name: tomcat-app
    ports:
      - "8081:8080"
    volumes:
      - ./Docker_backup:/usr/local/tomcat/webapps/Docker_backup
      - shared-data:/data
    environment:
      - TZ=Asia/Kolkata
    networks:
      - selenium-grid

  firefox:
    image: selenium/standalone-firefox:4.18.1
    container_name: firefox
    shm_size: 2gb
    ports:
      - "4444:4444"
    networks:
      - selenium-grid

  selenium-tests:
    build: .
    container_name: selenium-tests
    depends_on:
      - firefox
      - app
    working_dir: /app
    command: >
      sh -c "/init-data.sh; mvn test; mkdir -p /reports; cp -r target/surefire-reports /reports/"
    volumes:
      - ./reports:/reports
      - shared-data:/data
    networks:
      - selenium-grid

volumes:
  shared-data:

networks:
  selenium-grid:
